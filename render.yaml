databases:
  - name: finance-tracker-db
    databaseName: financetracker
    user: dbuser
    plan: free

services:
  # ── Backend Django Web Service ───────────────────────────────────────────────
  - type: web
    name: finance-tracker-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set this in the Render dashboard after deploying the frontend

  # ── Frontend React Vite Static Site ──────────────────────────────────────────
  - type: web
    name: finance-tracker-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this in the Render dashboard to: https://finance-tracker-backend.onrender.com/api
